<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>개미 터미널 — 모바일</title>
<meta name="description" content="개미들의 투자 개미굴 — 모바일">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',sans-serif;-webkit-tap-highlight-color:transparent;}
:root{--bg:#08090c;--cell:#0e1015;--bd:#eef3f8;--bd2:#3a4150;--txt:#fff;--dim:#aab2bd;--label:#e6ecf3;--up:#1fe07a;--down:#ff4d5e;--accent:#ff7a1a;}
body{background:var(--bg);color:var(--txt);padding-bottom:80px;font-weight:800;}
.mono{font-family:'SFMono-Regular',ui-monospace,'Menlo',monospace;font-variant-numeric:tabular-nums;letter-spacing:-1px;}
.up{color:var(--up);}.down{color:var(--down);}

.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;background:#08090c;border-bottom:2px solid var(--bd);}
.top .logo{font-size:22px;font-weight:900;color:var(--accent);}.top .logo span{color:#fff;}
.top .t{font-size:13px;color:var(--dim);font-weight:800;}
.wrap{padding:14px 14px 0;}

/* HERO — BTC | ETH 좌우 2칸 (화면 꽉 채움) */
.hero{display:grid;grid-template-columns:1fr 1fr;border:2px solid var(--bd);margin-bottom:14px;}
.hero .cell{padding:18px 15px;}
.hero .cell+.cell{border-left:2px solid var(--bd);}
.hero .lab{font-size:17px;font-weight:900;color:var(--label);}
.hero .px{font-size:33px;font-weight:900;margin-top:9px;line-height:1;}
.hero .chg{margin-top:11px;display:inline-block;font-size:17px;font-weight:900;padding:5px 11px;}
.hero .chg.up{background:var(--up);color:#03150b;}.hero .chg.down{background:var(--down);color:#1c0306;}

/* STAT 2x2 */
.stats{display:grid;grid-template-columns:1fr 1fr;border:2px solid var(--bd);border-top:0;margin-bottom:22px;}
.stats .s{padding:16px 15px;border-top:2px solid var(--bd);}
.stats .s:nth-child(odd){border-right:2px solid var(--bd);}
.stats .s .l{font-size:15.5px;font-weight:900;color:var(--label);}
.stats .s .v{font-size:27px;font-weight:900;margin-top:7px;}

.sec{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px;}
.sec h2{font-size:26px;font-weight:900;letter-spacing:-.5px;}
.toggle{display:flex;border:2px solid var(--bd);}
.toggle button{border:none;background:none;color:var(--dim);font-size:16px;font-weight:900;padding:8px 18px;}
.toggle button.on{background:var(--accent);color:#08090c;}

/* SIGNATURE 2x2 */
.sig{display:grid;grid-template-columns:1fr 1fr;border:2px solid var(--bd);margin-bottom:22px;}
.sig .c{padding:18px 15px;border-top:2px solid var(--bd);}
.sig .c:nth-child(-n+2){border-top:0;}
.sig .c:nth-child(odd){border-right:2px solid var(--bd);}
.sig .c .t{font-size:16px;font-weight:900;color:var(--label);}
.sig .c .big{font-size:33px;font-weight:900;margin-top:9px;line-height:1;}
.sig .c .sub{font-size:13px;color:var(--dim);font-weight:700;margin-top:8px;}

/* MOVERS */
.movers{border:2px solid var(--bd);margin-bottom:22px;}
.mrow{display:flex;align-items:center;gap:13px;padding:15px 14px;border-top:2px solid var(--bd2);}
.mrow:first-child{border-top:0;}
.mrow .rk{font-size:17px;font-weight:900;color:var(--dim);width:24px;}
.mrow img{width:42px;height:42px;border-radius:0;}
.mrow .nm{font-size:19px;font-weight:900;}.mrow .sy{font-size:13px;color:var(--dim);font-weight:800;text-transform:uppercase;}
.mrow .pr{margin-left:auto;text-align:right;}
.mrow .pr .p1{font-size:18px;font-weight:900;}
.mrow .pr .p2{font-size:18px;font-weight:900;margin-top:4px;display:inline-block;padding:3px 9px;}
.mrow .pr .p2.up{background:var(--up);color:#03150b;}.mrow .pr .p2.down{background:var(--down);color:#1c0306;}

/* MENU */
.menu{border:2px solid var(--bd);margin-bottom:24px;}
.mitem{display:flex;align-items:center;gap:14px;padding:18px 14px;border-top:2px solid var(--bd2);text-decoration:none;color:var(--txt);}
.mitem:first-child{border-top:0;}
.mitem .mi{font-size:26px;width:32px;text-align:center;}
.mitem .ml{font-size:19px;font-weight:900;}
.mitem .md{font-size:13px;color:var(--dim);font-weight:700;margin-top:2px;}
.mitem .mc{margin-left:auto;color:var(--dim);font-size:24px;}

.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:#08090c;border-top:2px solid var(--bd);padding:9px 0 calc(9px + env(safe-area-inset-bottom));}
.nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--dim);font-size:12.5px;font-weight:800;}
.nav a .ic{font-size:24px;}.nav a.on{color:var(--accent);}
.skel{background:#1a1f28;color:transparent;}
.foot{text-align:center;color:var(--dim);font-size:12.5px;padding:16px;line-height:1.6;}
</style></head>
<body>
  <div class="top"><div class="logo">🔥 개미<span> 터미널</span></div><div class="t" id="ageT">로딩…</div></div>
  <div class="wrap">

    <div class="hero">
      <div class="cell"><div class="lab">BTC 비트코인</div><div class="px mono skel" id="btcPx">·····</div><div class="chg" id="btcChg">—</div></div>
      <div class="cell"><div class="lab">ETH 이더리움</div><div class="px mono skel" id="ethPx">·····</div><div class="chg" id="ethChg">—</div></div>
    </div>
    <div class="stats" id="stats"></div>

    <div class="sec"><h2>⭐ 시그니처 수급</h2></div>
    <div class="sig" id="sig"></div>

    <div class="sec"><h2>🚀 급등·급락</h2><div class="toggle"><button class="on" data-m="g">급등</button><button data-m="l">급락</button></div></div>
    <div class="movers" id="movers"></div>

    <div class="sec"><h2>🔗 바로가기</h2></div>
    <div class="menu">
      <a class="mitem" href="events.html"><span class="mi">🎉</span><div><div class="ml">이벤트·당첨자</div><div class="md">진행 이벤트와 당첨 발표</div></div><span class="mc">›</span></a>
      <a class="mitem" href="indices.html"><span class="mi">📈</span><div><div class="ml">주요 주가지수</div><div class="md">미국·한국 증시·국채·매크로</div></div><span class="mc">›</span></a>
      <a class="mitem" href="https://t.me/fireant_crypto" target="_blank" rel="noopener"><span class="mi">✈️</span><div><div class="ml">텔레그램 채널</div><div class="md">불개미 실시간 시그널</div></div><span class="mc">›</span></a>
    </div>

    <div class="foot">🔥 개미 터미널 · 데이터 market_now/signature · 투자 권유 아님</div>
  </div>

  <nav class="nav">
    <a class="on" href="m.html"><span class="ic">🏠</span>홈</a>
    <a href="macro-news.html"><span class="ic">📰</span>뉴스</a>
    <a href="market.html"><span class="ic">📊</span>마켓</a>
    <a href="signals.html"><span class="ic">🐋</span>시그널</a>
    <a href="indices.html"><span class="ic">📈</span>지수</a>
  </nav>

<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const safe=(u)=>{try{const x=new URL(u,location.href);return /^https?:$/.test(x.protocol)?x.href:"";}catch{return"";}};
const comma=(n,d=0)=>n==null?"—":Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const usd=(v)=>{if(v==null)return"—";const a=Math.abs(v),s=v<0?"-":"";if(a>=1e12)return`${s}$${(a/1e12).toFixed(2)}T`;if(a>=1e9)return`${s}$${(a/1e9).toFixed(1)}B`;if(a>=1e6)return`${s}$${(a/1e6).toFixed(1)}M`;return`${s}$${comma(a)}`;};
const pc=(v)=>v==null?"—":`${v>=0?"▲":"▼"} ${Math.abs(v).toFixed(2)}%`;
const kl=(v)=>v<0?"down":"up";
let MN=null,MV="g";
async function getJSON(u){const r=await fetch(u+(u.includes("?")?"&":"?")+"t="+Date.now(),{cache:"no-store"});if(!r.ok)throw 0;return r.json();}

async function loadHome(){
  try{
    const d=await getJSON("data/v1/market_now.json");MN=d;
    let bn={};try{const a=await getJSON('https://api.binance.com/api/v3/ticker/24hr?symbols=%5B%22BTCUSDT%22%2C%22ETHUSDT%22%5D');if(Array.isArray(a))a.forEach(x=>bn[x.symbol]=x);}catch{}
    const bp=bn.BTCUSDT?+bn.BTCUSDT.lastPrice:(d.btc&&d.btc.price),bc=bn.BTCUSDT?+bn.BTCUSDT.priceChangePercent:(d.btc&&d.btc.chg);
    const ep=bn.ETHUSDT?+bn.ETHUSDT.lastPrice:(d.eth&&d.eth.price),ec=bn.ETHUSDT?+bn.ETHUSDT.priceChangePercent:(d.eth&&d.eth.chg);
    $("btcPx").classList.remove("skel"); $("btcPx").textContent="$"+comma(bp);
    $("btcChg").textContent=pc(bc); $("btcChg").className="chg "+kl(bc);
    $("ethPx").classList.remove("skel"); $("ethPx").textContent="$"+comma(ep);
    $("ethChg").textContent=pc(ec); $("ethChg").className="chg "+kl(ec);
    const fg=d.fear_greed||{};
    const fgko={"Extreme Fear":"극단공포","Fear":"공포","Neutral":"중립","Greed":"탐욕","Extreme Greed":"극단탐욕"};
    const fgc=fg.value==null?"":fg.value<25?"down":fg.value>=55?"up":"";
    $("stats").innerHTML=[
      ["공포·탐욕",fg.value!=null?`${fg.value} ${fgko[fg.class]||""}`:"—",fgc],
      ["김치 프리미엄",d.kimchi!=null?(d.kimchi>=0?"+":"")+d.kimchi.toFixed(2)+"%":"—",d.kimchi>=0?"up":"down"],
      ["BTC 도미넌스",d.btc_dominance!=null?d.btc_dominance.toFixed(1)+"%":"—",""],
      ["총 시가총액",usd(d.total_mcap),""],
    ].map(([l,v,c])=>`<div class="s"><div class="l">${l}</div><div class="v mono ${c}">${v}</div></div>`).join("");
    $("ageT").textContent="갱신 "+(d.generated_at||"").slice(11,16);
    renderMovers();
  }catch(e){ $("btcChg").textContent="재시도…"; }
}
function renderMovers(){
  if(!MN)return;
  const list=(MV==="g"?MN.gainers:MN.losers)||[];
  $("movers").innerHTML=list.map((c,i)=>`<div class="mrow">
    <div class="rk">${i+1}</div>
    <img src="${safe(c.image)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
    <div><div class="nm">${esc(c.name)}</div><div class="sy">${esc(c.symbol)}</div></div>
    <div class="pr"><div class="p1 mono">$${comma(c.price,c.price<1?4:2)}</div><div class="p2 mono ${kl(c.chg)}">${c.chg>=0?"+":""}${c.chg.toFixed(2)}%</div></div>
  </div>`).join("");
}
async function loadSig(){
  try{
    const s=await getJSON("data/v1/signature.json"),M=s.metrics||{};
    const defs=[["btc_etf","💵 BTC ETF 순유입",1],["dat_weekly","🏦 DAT 트레저리",1],["btc_oi_24h","📊 BTC 미결제약정",0],["cb_premium","🇺🇸 코인베이스 프리미엄",0]];
    $("sig").innerHTML=defs.map(([k,t,money])=>{const m=M[k]||{},val=m.value;const disp=money?usd(val):(m.raw??(val!=null?val+"%":"—"));const cls=val==null?"":val<0?"down":"up";return `<div class="c"><div class="t">${t}</div><div class="big mono ${cls}">${disp}</div><div class="sub">${esc((m.basis||m.as_of||"").slice(0,24))}</div></div>`;}).join("");
  }catch(e){ $("sig").innerHTML='<div class="c"><div class="sub">시그니처 로딩…</div></div>'; }
}
document.querySelectorAll(".toggle button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".toggle button").forEach(x=>x.classList.remove("on"));b.classList.add("on");MV=b.dataset.m;renderMovers();});
$("sig").innerHTML=Array(4).fill('<div class="c"><div class="big skel">····</div></div>').join("");
let timer=null;
function start(){stop();loadHome();loadSig();timer=setInterval(loadHome,60000);}
function stop(){clearInterval(timer);}
document.addEventListener("visibilitychange",()=>document.hidden?stop():start());
start();
</script>
</body></html>
