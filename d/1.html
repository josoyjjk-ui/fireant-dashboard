<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',sans-serif;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0a0c10;--cell:#14181f;--bd:#232b37;--bw:1px;--br:18px;--txt:#fff;--label:#dbe3ed;--dim:#8a94a3;--up:#22d07a;--down:#ff4d5e;--accent:#ff7a1a;--numwt:900;}
body{background:var(--bg);color:var(--txt);padding-bottom:82px;font-weight:800;font-size:calc(16px * 1);}
.mono{font-family:sans;font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
.up{color:var(--up);}.down{color:var(--down);}
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;background:var(--bg);border-bottom:var(--bw) solid var(--bd);}
.top .logo{font-size:22px;font-weight:900;color:var(--accent);}.top .logo span{color:var(--txt);}
.top .t{font-size:13px;color:var(--dim);font-weight:800;}
.wrap{padding:14px 14px 0;}
.card,.hero,.stats,.sig,.movers,.menu{background:var(--cell);border:var(--bw) solid var(--bd);border-radius:var(--br);overflow:hidden;margin-bottom:18px;}
.hero{display:grid;grid-template-columns:1fr 1fr;}
.hero .cell{padding:18px 15px;}
.hero .cell+.cell{border-left:var(--bw) solid var(--bd);}
.hero .lab{font-size:17px;font-weight:900;color:var(--label);}
.hero .px{font-size:calc(32px * 1);font-weight:var(--numwt);margin-top:9px;line-height:1;color:var(--txt);}
.chg{margin-top:11px;display:inline-block;font-size:16px;font-weight:900;padding:5px 11px;border-radius:8px;}
.chg.up,.p2.up{background:rgba(34,208,122,.16);color:var(--up);}.chg.down,.p2.down{background:rgba(255,77,94,.16);color:var(--down);}
.stats{display:grid;grid-template-columns:1fr 1fr;}
.stats .s{padding:16px 15px;}
.stats .s:nth-child(-n+2){border-bottom:var(--bw) solid var(--bd);}
.stats .s:nth-child(odd){border-right:var(--bw) solid var(--bd);}
.stats .s .l{font-size:15.5px;font-weight:900;color:var(--label);}
.stats .s .v{font-size:calc(26px * 1);font-weight:900;margin-top:7px;color:var(--txt);}
.sec{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 12px;}
.sec h2{font-size:calc(25px * 1);font-weight:900;letter-spacing:-.5px;color:var(--txt);}
.toggle{display:flex;border:var(--bw) solid var(--bd);border-radius:10px;overflow:hidden;}
.toggle button{border:none;background:none;color:var(--dim);font-size:16px;font-weight:900;padding:8px 17px;}
.toggle button.on{background:var(--accent);color:#08090c;}
.sig{display:grid;grid-template-columns:1fr 1fr;}
.sig .c{padding:18px 15px;}
.sig .c:nth-child(-n+2){border-bottom:var(--bw) solid var(--bd);}
.sig .c:nth-child(odd){border-right:var(--bw) solid var(--bd);}
.sig .c .t{font-size:16px;font-weight:900;color:var(--label);}
.sig .c .big{font-size:calc(32px * 1);font-weight:900;margin-top:9px;line-height:1;color:var(--txt);}
.sig .c .sub{font-size:13px;color:var(--dim);font-weight:700;margin-top:8px;}
.mrow{display:flex;align-items:center;gap:13px;padding:15px 14px;}
.mrow+.mrow{border-top:var(--bw) solid var(--bd);}
.mrow .rk{font-size:17px;font-weight:900;color:var(--dim);width:22px;}
.mrow img{width:42px;height:42px;border-radius:50%;}
.mrow .nm{font-size:19px;font-weight:900;color:var(--txt);}.mrow .sy{font-size:13px;color:var(--dim);font-weight:800;text-transform:uppercase;}
.mrow .pr{margin-left:auto;text-align:right;}.mrow .pr .p1{font-size:18px;font-weight:900;color:var(--txt);}
.mrow .pr .p2{font-size:18px;font-weight:900;margin-top:4px;display:inline-block;padding:3px 9px;border-radius:7px;}
.menu .mitem{display:flex;align-items:center;gap:14px;padding:18px 14px;text-decoration:none;color:var(--txt);}
.menu .mitem+.mitem{border-top:var(--bw) solid var(--bd);}
.menu .mi{font-size:26px;width:32px;text-align:center;}.menu .ml{font-size:19px;font-weight:900;}.menu .md{font-size:13px;color:var(--dim);font-weight:700;margin-top:2px;}
.menu .mc{margin-left:auto;color:var(--dim);font-size:24px;}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:var(--bg);border-top:var(--bw) solid var(--bd);padding:9px 0 calc(9px + env(safe-area-inset-bottom));}
.nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--dim);font-size:12.5px;font-weight:800;}
.nav a .ic{font-size:24px;}.nav a.on{color:var(--accent);}
.skel{background:rgba(127,127,127,.2);color:transparent;border-radius:6px;}
.foot{text-align:center;color:var(--dim);font-size:12.5px;padding:14px;line-height:1.6;}

</style></head><body>
