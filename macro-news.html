<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANTINFO — 매크로 뉴스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link rel="icon" type="image/png" href="/assets/favicon-32.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<meta property="og:image" content="https://antinfo.io/assets/og-image.png">
<meta name="description" content="거시경제·크립토 속보 — 코인텔레그래프·Investing.com 큐레이션.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',sans-serif;}
:root{--bg:#0a0c10;--card:#13161c;--line:#232936;--txt:#e7edf3;--dim:#8a94a3;--up:#ff5d6c;--down:#4d9bff;--accent:#ff3b30;--accent2:#ffb547;--live:#3aa0ff;}
html{background:var(--bg);}
body{background:var(--bg);color:var(--txt);}
html,body{overflow-x:hidden;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:15px 24px;border-bottom:1px solid var(--line);background:#0c0e13;position:sticky;top:0;z-index:10;}
.logo{font-size:21px;font-weight:900;color:var(--accent);}.logo span{color:#fff;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}.tab{padding:8px 15px;border-radius:9px;font-size:14px;font-weight:700;color:var(--dim);text-decoration:none;}.tab.on{background:var(--accent);color:#0a0c10;}
.btn{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:700;border:none;background:var(--accent);color:#0a0c10;text-decoration:none;}
.main{padding:22px 24px;max-width:900px;margin:0 auto;}
.head h1{font-size:24px;font-weight:900;}.head .sub{color:var(--dim);font-size:14px;margin-top:4px;}
.filters{display:flex;gap:8px;margin:16px 0;}
.fbtn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer;}
.fbtn.on{background:var(--accent);color:#0a0c10;border-color:var(--accent);}
.item{display:block;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:13px;margin-bottom:8px;text-decoration:none;color:var(--txt);}
.item:hover{border-color:var(--accent);}
.item.hi{border-color:#5a2230;}
.item .ti{font-size:13px;font-weight:700;line-height:1.4;}
.item .impbadge{display:inline-block;font-size:10px;font-weight:900;color:#fff;background:var(--down);padding:1px 7px;border-radius:5px;margin-right:7px;vertical-align:middle;}
.item .sum{margin:5px 0 2px;padding-left:14px;}
.item .sum li{font-size:12px;color:#cdd6e0;line-height:1.5;margin-bottom:2px;}
.item .meta{font-size:11px;color:var(--dim);margin-top:5px;display:flex;gap:8px;align-items:center;}
.cat{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;}
.cat.크립토{background:#0e2236;color:var(--live);}.cat.거시{background:#231a0c;color:var(--accent2);}
.cat.한국주식{background:#0e2a1a;color:var(--up);}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--down);box-shadow:0 0 7px var(--down);margin-right:7px;vertical-align:middle;animation:bl 1.3s infinite;}
@keyframes bl{50%{opacity:.35}}
.foot{padding:22px;color:var(--dim);font-size:11px;border-top:1px solid var(--line);text-align:center;margin-top:30px;}
.ham{display:none;font-size:25px;background:none;border:none;color:var(--txt);font-weight:800;line-height:1;cursor:pointer;padding:0 4px 0 0;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:250px;max-width:82vw;background:#12161d;border-right:1px solid var(--line);transform:translateX(-100%);transition:transform .25s ease;z-index:60;padding:18px 14px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
body.navopen .drawer{transform:none;}
.drawer .dh{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 14px;}
.drawer .dh .dlogo{font-size:20px;font-weight:900;color:#ff3b30;}
.drawer .x{font-size:20px;color:var(--dim);background:none;border:none;cursor:pointer;}
.drawer a{display:flex;align-items:center;gap:14px;padding:15px 12px;border-radius:14px;text-decoration:none;color:var(--txt);font-size:17px;font-weight:800;}
.drawer a .ic{font-size:22px;width:26px;text-align:center;}
.drawer a.on{background:rgba(255,59,48,.14);color:#ff3b30;}
.drawer .ddiv{height:1px;background:var(--line);margin:9px 6px;}
.drawer a.sub{font-size:15px;font-weight:700;color:var(--dim);}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:55;}
body.navopen .backdrop{opacity:1;pointer-events:auto;}
@media(max-width:600px){
  body{font-size:16px;}
  .nav{flex-wrap:wrap;justify-content:flex-start;padding:13px 15px;gap:8px;}.logo{font-size:22px;}
  #authSlot{flex-shrink:1;min-width:0;}
  #authSlot a,#authSlot button{font-size:12px;padding:7px 10px;white-space:nowrap;}
  .tabs{order:3;width:100%;overflow-x:auto;flex-wrap:nowrap;gap:7px;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .tabs::-webkit-scrollbar{display:none;}.tab{flex:0 0 auto;font-size:15.5px;padding:9px 15px;}
  .btn{font-size:13px;padding:8px 12px;white-space:nowrap;flex-shrink:0;}
  .main{padding:16px 14px;}
  .head h1{font-size:24px;}.head .sub{font-size:14px;}
  .filters{flex-wrap:wrap;gap:8px;}.fbtn{font-size:14px;padding:8px 15px;}
  .item{padding:11px 13px;}
  .item .ti{font-size:14px;line-height:1.45;}
  .item .sum li{font-size:13px;line-height:1.55;}
  .item .meta{font-size:12px;}.cat{font-size:11px;}
  .ham{display:inline-flex;}
  .tabs{display:none !important;}
  .nav>.btn{display:none;}
  .nav{justify-content:flex-start;gap:10px;}
}
</style></head>
<body>

  </div>
  <div class="main">
    <div class="head"><h1>📰 매크로 뉴스</h1><div class="sub">전세계 속보를 실시간 집계해 크립토·거시·한국주식으로 자동분류 · <span id="age">로딩…</span></div></div>
    <div class="filters">
      <button class="fbtn on" data-f="all">전체</button>
      <button class="fbtn" data-f="크립토">코인</button>
      <button class="fbtn" data-f="거시">거시경제</button>
      <button class="fbtn" data-f="한국주식">한국주식</button>
    </div>
    <div id="list"></div>
  </div>
  <div class="foot">🐜 ANTINFO · 개미들이 필요한 모든 투자정보 · 출처 Walter Bloomberg·Tree News·Phoenix·Financial Juice·코인텔레그래프·CoinDesk·WSJ·CNBC·한국경제·이데일리 외 · AI 요약 · 투자 권유 아님</div>
<script src="assets/macro-news.js"></script>
