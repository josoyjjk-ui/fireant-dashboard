<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;}
:root{--bg:#0a0c10;--card:#13161c;--line:#232936;--txt:#e7edf3;--dim:#8a94a3;--up:#21d07a;--down:#ff4d5e;--accent:#ff7a1a;--accent2:#ffb547;--live:#3aa0ff;}
body{background:var(--bg);color:var(--txt);}
.nav{display:flex;align-items:center;justify-content:space-between;padding:15px 24px;border-bottom:1px solid var(--line);background:#0c0e13;position:sticky;top:0;z-index:10;}
.logo{font-size:21px;font-weight:900;color:var(--accent);}.logo span{color:#fff;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}.tab{padding:8px 15px;border-radius:9px;font-size:14px;font-weight:700;color:var(--dim);text-decoration:none;}.tab.on{background:var(--accent);color:#0a0c10;}
.btn{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:700;border:none;background:var(--accent);color:#0a0c10;text-decoration:none;}
.main{padding:22px 24px;max-width:1100px;margin:0 auto;}
.head h1{font-size:24px;font-weight:900;}.head .sub{color:var(--dim);font-size:14px;margin-top:4px;}
.seclabel{font-size:16px;font-weight:900;margin:26px 0 12px;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.ev{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;display:flex;flex-direction:column;}
.ev .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.ev .ti{font-size:17px;font-weight:800;line-height:1.3;}
.badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.b-active{background:#0e2236;color:var(--live);}.b-ended{background:#22262e;color:var(--dim);}.b-soon{background:#231a0c;color:var(--accent2);}
.ev .desc{font-size:13px;color:#cdd6e0;line-height:1.55;margin-bottom:10px;}
.ev .reward{font-size:12.5px;color:var(--accent2);font-weight:700;margin-bottom:10px;}
.ev .meta{font-size:12px;color:var(--dim);margin-top:auto;}
.ev a.go{margin-top:10px;display:inline-block;padding:8px 14px;border-radius:9px;background:#1c2330;color:var(--txt);text-decoration:none;font-weight:700;font-size:13px;text-align:center;}
.winrow{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;}
.winrow .n{font-weight:700;font-size:14px;}.winrow .c{font-size:13px;color:var(--accent2);font-weight:800;}
.winrow a{color:var(--accent);text-decoration:none;font-weight:700;font-size:13px;}
.foot{padding:22px;color:var(--dim);font-size:11px;border-top:1px solid var(--line);text-align:center;margin-top:40px;}
.empty{color:var(--dim);font-size:13px;padding:14px;}
.krx{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#13233a,#101620);border:1px solid #20344e;border-radius:16px;padding:18px 20px;text-decoration:none;color:var(--txt);margin-bottom:8px;}
.krx .ic{font-size:34px;flex-shrink:0;}
.krx .tx .t1{font-size:17px;font-weight:800;}
.krx .tx .t2{font-size:13px;color:var(--dim);margin-top:4px;}
.krx .go{margin-left:auto;font-size:14px;font-weight:800;color:var(--live);white-space:nowrap;}
.krx:hover{border-color:var(--live);}
@media(max-width:680px){.cards{grid-template-columns:1fr;}}
@media(max-width:600px){
  body{font-size:16px;}
  .nav{flex-wrap:wrap;padding:13px 15px;gap:10px;}.logo{font-size:22px;}
  .tabs{order:3;width:100%;overflow-x:auto;flex-wrap:nowrap;gap:7px;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .tabs::-webkit-scrollbar{display:none;}.tab{flex:0 0 auto;font-size:15.5px;padding:9px 15px;}
  .btn{font-size:14px;padding:9px 15px;}
  .main{padding:16px 14px;}
  .head h1{font-size:24px;}.head .sub{font-size:14px;}.seclabel{font-size:19px;}
  .ev .ti{font-size:18.5px;}.ev .desc{font-size:15.5px;line-height:1.6;}.ev .reward{font-size:14.5px;}.ev .meta{font-size:13.5px;}
  .ev a.go{font-size:15.5px;padding:11px 16px;}
  .winrow .n{font-size:16.5px;}.winrow .c{font-size:15.5px;}.winrow a{font-size:15px;}
}
</style></head>

  <div class="main">
    <div class="head"><h1>🎉 이벤트 모음</h1><div class="sub">진행/예정 이벤트와 당첨자 발표를 한 곳에서</div></div>
    <div class="seclabel">🏦 한국 거래소 이벤트</div>
    <a class="krx" href="kr-exchange/">
      <span class="ic">🏦</span>
      <span class="tx"><span class="t1">업비트 · 빗썸 · 코인원 · 코빗 · 고팍스 진행중 이벤트</span><span class="t2">5대 원화거래소 리테일 이벤트 · 매일 자동 갱신</span></span>
      <span class="go">전체 보기 →</span>
    </a>
    <div class="seclabel">🔥 진행중 · 예정</div>

    <div class="cards" id="endedWrap"></div>
  </div>
  <div class="foot">🐜 ANTINFO · 개미투자자들의 투자정보 · antinfo.io · 투자 권유 아님</div>
