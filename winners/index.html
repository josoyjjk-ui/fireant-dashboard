<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 당첨자 조회 — 불개미 CRYPTO</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');
  @import url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css');

  :root, [data-theme="dark"] {
    --bg: #08080f;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,68,68,0.4);
    --red: #FF3B3B;
    --orange: #FF6B35;
    --gold: #FFD740;
    --text: #E8E8ED;
    --text-dim: #6B6B80;
    --text-muted: #8A8AA8;
    --radius: 16px;
    --radius-sm: 10px;
    --nav-bg: rgba(8,8,15,0.85);
    --particle-opacity: 1;
    --ambient-opacity: 1;
  }

  [data-theme="light"] {
    --bg: #F5F5F7;
    --surface: rgba(0,0,0,0.03);
    --surface-hover: rgba(0,0,0,0.06);
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(255,68,68,0.3);
    --red: #E02020;
    --orange: #E85D2A;
    --gold: #D4A017;
    --text: #1A1A2E;
    --text-dim: #5A5A72;
    --text-muted: #9E9EB5;
    --nav-bg: rgba(245,245,247,0.9);
    --particle-opacity: 0.3;
    --ambient-opacity: 0.4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Geist', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s, color 0.4s;
  }

  canvas#particles {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
    opacity: var(--particle-opacity);
    transition: opacity 0.4s;
  }

  .ambient {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(255,215,64,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    opacity: var(--ambient-opacity);
    transition: opacity 0.4s;
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  .nav {
    display: flex; align-items: center; justify-content: center;
    padding: 20px 0;
    position: sticky; top: 0; z-index: 10;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner { display: flex; align-items: center; width: 100%; max-width: 720px; position: relative; justify-content: center; }
  .nav-links { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; white-space: nowrap; }
  .nav-links a {
    color: var(--text-dim); text-decoration: none;
    font-size: 1rem; font-weight: 600;
    padding: 6px 10px; border-radius: 8px;
    transition: all 0.2s;
  }
  .nav-links a:hover { color: var(--text); background: var(--surface); }

  .page-header {
    text-align: center;
    padding: 40px 0 24px;
  }
  .page-header .icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
  }
  .page-header h1 {
    font-size: 1.8rem; font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .page-header p {
    color: var(--text-dim); font-size: 0.92rem;
    margin-top: 10px;
    line-height: 1.7;
  }

  .sheet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
  }

  .sheet-actions {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 14px;
  }

  .open-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255,215,64,0.28);
    background: linear-gradient(135deg, rgba(255,215,64,0.16), rgba(255,107,53,0.14));
    color: var(--text);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 800;
    transition: all 0.2s;
  }
  .open-btn:hover {
    transform: translateY(-1px);
    border-color: rgba(255,215,64,0.45);
    box-shadow: 0 8px 24px rgba(255,215,64,0.12);
  }

  .sheet-frame {
    width: 100%;
    min-height: 700px;
    height: 70vh;
    border: 0;
    border-radius: 12px;
    background: #fff;
  }

  .footer {
    text-align: center;
    margin-top: 48px; padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .footer p { font-size: 0.72rem; color: var(--text-muted); }

  @media (max-width: 600px) {
    .nav-inner { max-width: 100%; padding: 0 8px; }
    .nav-links { gap: 2px; width: 100%; overflow-x: auto; justify-content: center; }
    .nav-links a { font-size: 0.72rem; padding: 4px 6px; }
    .sheet-card { padding: 12px; }
    .sheet-actions { justify-content: center; }
  }
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="97eb5034-8d7d-4c30-a7ef-53d73cfe8298"></script>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-links">
      <a href="/" style="color:var(--text);font-weight:800;">불개미 Crypto</a>
      <a href="/feed/" style="color:var(--text-dim);">정기 시장분석</a>
      <a href="/events/" style="color:var(--text-dim);">이벤트</a>
      <a href="/indicators/" style="color:var(--text-dim);">불개미지표</a>
    </div>
  </div>
</div>

<canvas id="particles"></canvas>
<div class="ambient"></div>

<div class="wrap">
  <div class="page-header">
    <span class="icon">🏆</span>
    <h1>🏆 당첨자 조회 — 불개미 CRYPTO</h1>
    <p>당첨자 정보는 아래 Google Sheets에서 바로 확인할 수 있습니다.</p>
  </div>

  <section class="sheet-card">
    <div class="sheet-actions">
      <a class="open-btn" href="https://docs.google.com/spreadsheets/d/1lv3XQiHYwoZqHV4ukesaQqlnjvllS2XvZDkTx4_NvrE/edit?usp=sharing" target="_blank" rel="noopener noreferrer">새 탭에서 열기 ↗</a>
    </div>
    <iframe
      class="sheet-frame"
      src="https://docs.google.com/spreadsheets/d/1lv3XQiHYwoZqHV4ukesaQqlnjvllS2XvZDkTx4_NvrE/pubhtml?widget=true&amp;headers=false"
      title="불개미 CRYPTO 당첨자 Google Sheets"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"></iframe>
  </section>

  <div style="text-align:center; padding: 20px 0 10px; position:relative; z-index:1;">
    <button id="themeToggle" title="테마 전환" style="background:none; border:1px solid var(--border); border-radius:8px; color:var(--text-dim); padding:6px 14px; cursor:pointer; font-size:0.8rem;">🌙</button>
  </div>

  <div class="footer">
    <p>🔥 불개미 CRYPTO · <a href="https://t.me/fireant_crypto" target="_blank" style="color:var(--text-muted);text-decoration:none;">@fireant_crypto</a></p>
  </div>
</div>

<script>
const root = document.documentElement;
const saved = localStorage.getItem('theme') || 'dark';
root.setAttribute('data-theme', saved);
document.getElementById('themeToggle').textContent = saved === 'dark' ? '🌙' : '☀️';
document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = root.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
});

(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      o: Math.random() * 0.4 + 0.1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p) => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,215,64,${p.o})`;
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = innerWidth;
      if (p.x > innerWidth) p.x = 0;
      if (p.y < 0) p.y = innerHeight;
      if (p.y > innerHeight) p.y = 0;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
