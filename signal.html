<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANTINFO — 시그니처 수급 상세</title>
<link rel="icon" type="image/png" href="/assets/favicon-32.png">
<meta name="description" content="ANTINFO 시그니처 수급 상세 — 현물 ETF 순유입·미결제약정(OI)·코인베이스 프리미엄을 BTC·ETH별로.">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@view-transition{navigation:auto;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;}
:root{--bg:#0a0c10;--card:#13161c;--line:#232936;--txt:#e7edf3;--dim:#8a94a3;--up:#ff3b30;--down:#3aa0ff;--accent:#ff3b30;--accent2:#ffb547;}
html{background:var(--bg);scrollbar-gutter:stable;}body{background:var(--bg);color:var(--txt);}html,body{overflow-x:hidden;}
.nav{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--line);background:#0c0e13;position:sticky;top:0;z-index:10;}
.nav a.back{color:var(--dim);text-decoration:none;font-weight:800;font-size:14px;}
.nav a.back:hover{color:var(--txt);}
.nav .logo{font-size:18px;font-weight:900;color:var(--accent);margin-left:auto;text-decoration:none;}
.main{padding:22px 18px;max-width:1000px;margin:0 auto;}
.head h1{font-size:23px;font-weight:900;}
.head .sub{color:var(--dim);font-size:13.5px;margin-top:6px;line-height:1.55;}
.up{color:var(--up);}.down{color:var(--down);}.mono{font-variant-numeric:tabular-nums;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;}
.card .lab{font-size:14px;font-weight:800;color:var(--dim);display:flex;align-items:center;justify-content:space-between;}
.card .lab .tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;}
.tag.u{background:#2a1116;color:var(--up);}.tag.d{background:#0e2236;color:var(--down);}
.card .big{font-size:30px;font-weight:900;letter-spacing:-.5px;margin:7px 0 3px;}
.card .meta{font-size:11.5px;color:var(--dim);}
.chartbox{height:200px;position:relative;margin-top:12px;}
.tf{display:flex;gap:6px;margin:16px 0 0;}
.tf button{border:1px solid var(--line);background:transparent;color:var(--dim);font-weight:800;font-size:12px;padding:5px 11px;border-radius:8px;cursor:pointer;}
.tf button.on{background:var(--accent);color:#0a0c10;border-color:var(--accent);}
.gloss{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-top:18px;font-size:13.5px;line-height:1.7;color:#cdd6e0;}
.gloss b{color:#fff;}
.note{font-size:11.5px;color:var(--dim);margin-top:9px;}
.tblwrap{margin-top:22px;}
.tblwrap h3{font-size:15px;font-weight:800;margin-bottom:9px;}
.etscroll{max-height:540px;overflow-y:auto;border:1px solid var(--line);border-radius:12px;}
.etable{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums;}
.etable thead th{position:sticky;top:0;background:#0f1319;color:var(--dim);font-weight:800;font-size:11.5px;text-align:right;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
.etable thead th:first-child{text-align:left;}
.etable td{padding:8px 12px;border-bottom:1px solid #161b23;text-align:right;white-space:nowrap;}
.etable td:first-child{text-align:left;color:var(--dim);}
.etable tbody tr:hover{background:#11151c;}
@media(max-width:640px){.etable{font-size:12px;}.etable th,.etable td{padding:7px 8px;}}
.empty{color:var(--dim);font-size:12.5px;text-align:center;padding:60px 0;}
.foot{padding:24px;color:var(--dim);font-size:11px;border-top:1px solid var(--line);text-align:center;margin-top:34px;}
@media(max-width:640px){.grid{grid-template-columns:1fr;}.head h1{font-size:20px;}.card .big{font-size:26px;}}
</style></head>
<body>
<div class="nav"><a class="back" href="/">← 대시보드</a><a class="logo" href="/">🐜 ANTINFO</a></div>
<div class="main">
  <div class="head"><h1 id="title">시그니처 수급 상세</h1><div class="sub" id="sub">불러오는 중…</div></div>
  <div class="tf" id="tf" style="display:none"><button data-tf="1D" class="on">1일</button><button data-tf="1W">1주</button><button data-tf="1M">1개월</button></div>
  <div class="tf" id="etfTf" style="display:none"><button data-agg="D" class="on">일간</button><button data-agg="W">주간</button><button data-agg="M">월간</button></div>
  <div class="grid" id="grid"></div>
  <div id="tables"></div>
  <div class="gloss" id="gloss"></div>
</div>
<div class="foot">🐜 ANTINFO · 무료 공개 API(Binance·Coinbase·일일시황) · 투자 권유 아님</div>

<script>
const $=id=>document.getElementById(id);
const qs=new URLSearchParams(location.search);
const M=(qs.get('m')||'etf').toLowerCase();
const f2=n=>n.toLocaleString('en-US',{maximumFractionDigits:2});
const usd=n=>{const a=Math.abs(n);return (n<0?'-$':'$')+(a>=1e9?(a/1e9).toFixed(2)+'B':a>=1e6?(a/1e6).toFixed(1)+'M':f2(a));};
const pct=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const ucls=n=>n>=0?'up':'down';
async function J(u){const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw 0;return r.json();}

const CFG={
  etf:{title:'💵 현물 ETF 순유입 — BTC · ETH',
    sub:'미국 증시 상장 <b>현물 ETF</b>의 일일 순유입/유출. 기관 자금이 비트코인·이더리움으로 들어오는지(유입=빨강) 나가는지(유출=파랑)를 보여주는 핵심 수급 지표입니다. (D-1, 뉴욕 마감 기준)',
    items:[{key:'btc_etf',label:'BTC 현물 ETF'},{key:'eth_etf',label:'ETH 현물 ETF'}],money:true,live:null,
    gloss:'<b>현물 ETF 순유입</b>이란? 블랙록·피델리티 등이 운용하는 비트코인/이더리움 현물 ETF에 하루 동안 들어오고 나간 자금의 합계입니다. <b>+(유입)</b>은 기관 매수세, <b>−(유출)</b>은 차익실현·이탈로 읽습니다. <b>BTC</b>는 ETF 출시(2024-01) 이후 <b>전체 일일·누적 추이</b>를 제공하며, ETH는 당일값 중심(누적 중)입니다.'},
  btc_etf:{title:'💵 BTC 현물 ETF 순유입',
    sub:'미국 증시 상장 <b>비트코인 현물 ETF</b>의 일일 순유입/유출과 누적. 기관 자금이 비트코인으로 들어오는지(유입=빨강)/나가는지(유출=파랑)를 보여주는 핵심 수급 지표입니다. (D-1, 뉴욕 마감 기준)',
    items:[{key:'btc_etf',label:'BTC 현물 ETF'}],money:true,live:null,
    gloss:'<b>BTC 현물 ETF 순유입</b>이란? 블랙록·피델리티 등이 운용하는 비트코인 현물 ETF에 하루 동안 들어오고 나간 자금의 합계입니다. <b>+(유입)</b>은 기관 매수세, <b>−(유출)</b>은 차익실현·이탈. 2024-01 출시 이후 전체 일일·누적 추이를 제공합니다.'},
  eth_etf:{title:'💵 ETH 현물 ETF 순유입',
    sub:'미국 증시 상장 <b>이더리움 현물 ETF</b>의 일일 순유입/유출과 누적. 기관 자금이 이더리움으로 들어오는지(유입=빨강)/나가는지(유출=파랑)를 보여줍니다. (D-1, 뉴욕 마감 기준)',
    items:[{key:'eth_etf',label:'ETH 현물 ETF'}],money:true,live:null,
    gloss:'<b>ETH 현물 ETF 순유입</b>이란? 이더리움 현물 ETF에 하루 동안 들어오고 나간 자금의 합계입니다. <b>+(유입)</b>은 기관 매수세, <b>−(유출)</b>은 차익실현·이탈. 2024-07 출시 이후 전체 일일·누적 추이를 제공합니다.'},
  oi:{title:'📊 미결제약정 (OI) — BTC · ETH',
    sub:'무기한선물에서 청산되지 않고 살아있는 <b>미결제약정(OI)</b> 규모. <b>늘면</b> 레버리지 베팅 자금 유입(변동성↑), <b>줄면</b> 청산·포지션 정리로 자금이 빠지는 중입니다. (Binance 선물 라이브)',
    items:[{key:'btc_oi_24h',label:'BTC OI 24h',sym:'BTCUSDT'},{key:'eth_oi_24h',label:'ETH OI 24h',sym:'ETHUSDT'}],money:false,live:'oi',
    gloss:'<b>미결제약정(OI)</b>이란? 아직 청산되지 않은 선물 계약의 총액입니다. 가격이 오르며 OI도 늘면 <b>신규 매수 레버리지 유입</b>(추세 강화), 가격이 빠지며 OI가 급감하면 <b>청산·디레버리징</b> 신호입니다. 차트는 Binance 선물의 실제 OI 추이입니다.'},
  cb:{title:'🇺🇸 코인베이스 프리미엄',
    sub:'미국 거래소 <b>Coinbase(USD)</b>와 글로벌 <b>Binance(USDT)</b>의 BTC 가격차. <b>양(+)</b>이면 미국 현물 수요가 상대적으로 강함을 시사합니다. (라이브)',
    items:[{key:'cb_premium',label:'Coinbase 프리미엄',hist:'cb',live:'cb'}],money:false,live:'cb',
    gloss:'<b>코인베이스 프리미엄</b>이란? 미국계 기관·개인이 주로 쓰는 Coinbase의 BTC 가격이 글로벌 기준(Binance)보다 높은지(+)/낮은지(−)를 % 로 나타낸 값입니다. <b>+</b> 확대는 미국발 매수세, <b>−</b>는 미국 약세 신호로 해석합니다.'}};

const cfg=CFG[M]||CFG.etf;
$('title').innerHTML=cfg.title;
$('sub').innerHTML=cfg.sub;
$('gloss').innerHTML='📖 '+cfg.gloss;

const lbl=(ts,tf)=>{const d=new Date(ts);return tf==='1D'?String(d.getHours()).padStart(2,'0')+':00':(d.getMonth()+1)+'/'+d.getDate();};
const charts={};
function lineChart(id,labels,data,color,fmt){
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart($(id),{type:'line',data:{labels,datasets:[{data,borderColor:color,borderWidth:2,fill:true,backgroundColor:color.replace('rgb','rgba').replace(')',',.10)'),tension:.32,pointRadius:data.length<=2?3:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)}}},
      scales:{x:{grid:{display:false},ticks:{color:'#5c6675',maxTicksLimit:6,font:{size:10}}},y:{grid:{color:'#1a1f28'},ticks:{color:'#5c6675',font:{size:10},callback:fmt}}}}});
}
function comboChart(id,labels,daily,cum){
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart($(id),{data:{labels,datasets:[
    {type:'bar',label:'일일 순유입',data:daily,yAxisID:'y',order:2,borderWidth:0,backgroundColor:daily.map(v=>v>=0?'rgba(255,59,48,.55)':'rgba(58,160,255,.55)')},
    {type:'line',label:'누적 순유입',data:cum,yAxisID:'y1',order:1,borderColor:'#ffb547',borderWidth:2,pointRadius:0,tension:.2}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:true,position:'top',labels:{color:'#aeb8c4',boxWidth:10,font:{size:11}}},
      tooltip:{callbacks:{label:c=>c.dataset.label+' '+usd(c.parsed.y)}}},
    scales:{x:{grid:{display:false},ticks:{color:'#5c6675',maxTicksLimit:6,font:{size:10}}},
      y:{position:'left',grid:{color:'#1a1f28'},ticks:{color:'#5c6675',font:{size:10},callback:usd}},
      y1:{position:'right',grid:{display:false},ticks:{color:'#ffcf87',font:{size:10},callback:usd}}}}});
}

let SIG={};
async function loadSig(){try{const s=await J('/data/v1/signature.json?t='+Date.now());SIG=s.metrics||{};return s;}catch(e){return null;}}

// 카드 골격
function renderCards(){
  $('grid').innerHTML=cfg.items.map((it,i)=>`
    <div class="card"><div class="lab"><span>${it.label}</span><span class="tag" id="tag${i}"></span></div>
      <div class="big mono" id="val${i}">–</div><div class="meta" id="meta${i}">불러오는 중…</div>
      <div class="chartbox"><canvas id="ch${i}"></canvas></div>
      <div class="note" id="note${i}"></div></div>`).join('');
  if(cfg.items.length===1)$('grid').style.gridTemplateColumns='1fr';  // 단독 페이지는 1열(차트 꽉 차게)
}

let ETFMODE='D'; const ETFITEMS=[];
function isoWeek(ds){const dt=new Date(ds+'T00:00:00Z');const day=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-day+3);const ft=new Date(Date.UTC(dt.getUTCFullYear(),0,4));const wk=1+Math.round(((dt-ft)/864e5-3+((ft.getUTCDay()+6)%7))/7);return dt.getUTCFullYear()+'-W'+String(wk).padStart(2,'0');}
function aggregate(h,mode){
  if(mode==='D')return h.map(r=>({label:r.date,value:r.value,cum:r.cum,traded:r.traded,assets:r.assets}));
  const keyf=mode==='W'?isoWeek:(d=>d.slice(0,7));
  const m=new Map();
  for(const r of h){const k=keyf(r.date);if(!m.has(k))m.set(k,{label:k,value:0,cum:null,traded:0,tradedN:0,assets:null});const g=m.get(k);g.value+=r.value||0;if(r.traded!=null){g.traded+=r.traded;g.tradedN++;}if(r.cum!=null)g.cum=r.cum;if(r.assets!=null)g.assets=r.assets;}
  return [...m.values()].map(g=>({label:g.label,value:g.value,cum:g.cum,traded:g.tradedN?g.traded:null,assets:g.assets}));
}
function renderTable(it,rows,mode){
  const r2=rows.slice().reverse();
  const modeKo={D:'일간',W:'주간',M:'월간'}[mode],col={D:'날짜',W:'주(ISO)',M:'월'}[mode],dcol={D:'일일 순유입',W:'주간 순유입',M:'월간 순유입'}[mode];
  const fmtD=v=>(v>=0?'+':'-')+usd(Math.abs(v)).replace('-','');
  let html=`<div class="tblwrap"><h3>📋 ${it.label} ${modeKo} 유출입 — ${r2.length}개 (최신순)</h3><div class="etscroll"><table class="etable"><thead><tr><th>${col}</th><th>${dcol}</th><th>누적 순유입</th><th>거래대금</th><th>순자산</th></tr></thead><tbody>`;
  for(const r of r2){const c=r.value>=0?'up':'down';
    html+=`<tr><td>${r.label}</td><td class="${c}">${fmtD(r.value)}</td><td>${r.cum!=null?usd(r.cum):'—'}</td><td>${r.traded!=null?usd(r.traded):'—'}</td><td>${r.assets!=null?usd(r.assets):'—'}</td></tr>`;}
  html+=`</tbody></table></div><div class="note">출처 SoSoValue · 유입(+)=빨강 · 유출(−)=파랑</div></div>`;
  document.getElementById('tables').insertAdjacentHTML('beforeend',html);
}
function drawEtfCharts(){
  document.getElementById('tables').innerHTML='';
  const modeKo={D:'일간',W:'주간',M:'월간'}[ETFMODE];
  for(const {i,it,h} of ETFITEMS){
    const agg=aggregate(h,ETFMODE);
    comboChart('ch'+i, agg.map(r=>String(r.label).slice(2)), agg.map(r=>r.value), agg.map(r=>r.cum));
    $('note'+i).textContent='막대=순유입(빨강)/유출(파랑) · 선=누적 · '+modeKo+' '+agg.length+'개 · 출처 SoSoValue';
    renderTable(it,agg,ETFMODE);
  }
}
async function fillEtfCb(){
  document.getElementById('tables').innerHTML='';  // 재호출 시 중복 방지
  ETFITEMS.length=0;
  const s=await loadSig();
  for(let i=0;i<cfg.items.length;i++){
    const it=cfg.items[i],m=SIG[it.key]||{},v=m.value;
    if(v!=null){$('val'+i).textContent=cfg.money?usd(v):pct(v);$('val'+i).className='big mono '+ucls(v);
      const t=$('tag'+i);t.textContent=v>=0?(cfg.money?'유입':'증가'):(cfg.money?'유출':'감소');t.className='tag '+(v>=0?'u':'d');}
    else $('val'+i).textContent='—';
    $('meta'+i).textContent=(m.basis||m.as_of||'기준 미상');
    // ETF(BTC·ETH): 출시 이후 전체. 일간/주간/월간 토글로 차트+표 재집계
    if(it.key==='btc_etf'||it.key==='eth_etf'){
      try{const h=await J('/data/v1/history/'+it.key+'_full.json?t='+Date.now());
        const last=h[h.length-1],launch=h[0].date.slice(0,7);
        $('meta'+i).textContent=launch+' 출시 이후 전체 · 누적 순유입 '+usd(last.cum);
        ETFITEMS.push({i,it,h});
      }catch(e){$('ch'+i).closest('.chartbox').innerHTML='<div class="empty">ETF 전체 데이터를 불러오지 못했습니다.</div>';}
      continue;
    }
    // 히스토리 차트
    const hk=it.hist||it.key;
    try{const h=await J('/data/v1/history/'+hk+'.json?t='+Date.now());
      if(Array.isArray(h)&&h.length){const labels=h.map(x=>(x.date||'').slice(5)),data=h.map(x=>x.value);
        lineChart('ch'+i,labels,data,'rgb(255,59,48)',cfg.money?usd:(x=>x.toFixed(3)+'%'));
        $('note'+i).textContent='출처 일일시황 누적 · '+h.length+'개 시점';
      }else throw 0;
    }catch(e){$('ch'+i).closest('.chartbox').innerHTML='<div class="empty">추세 데이터 누적 중… 매일 1개 시점씩 쌓입니다.</div>';}
    // 코인베이스 프리미엄 라이브 현재값
    if(it.live==='cb'){try{const[cb,bn]=await Promise.all([J('https://api.exchange.coinbase.com/products/BTC-USD/ticker'),J('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')]);
      const p=((+cb.price)/(+bn.price)-1)*100;$('val'+i).textContent=pct(p);$('val'+i).className='big mono '+ucls(p);
      const t=$('tag'+i);t.textContent=p>=0?'미국 강세':'미국 약세';t.className='tag '+(p>=0?'u':'d');
      $('meta'+i).textContent='Coinbase $'+f2(+cb.price)+' vs Binance $'+f2(+bn.price)+' · 라이브';}catch(e){}}
  }
  if(ETFITEMS.length){$('etfTf').style.display='flex';drawEtfCharts();}
}

async function fillOi(tf){
  const s=await loadSig();
  const m={'1D':{p:'1h',lim:24},'1W':{p:'4h',lim:42},'1M':{p:'1d',lim:30}}[tf]||{p:'1h',lim:24};
  for(let i=0;i<cfg.items.length;i++){
    const it=cfg.items[i],mt=SIG[it.key]||{},v=mt.value;
    if(v!=null){$('val'+i).textContent=pct(v);$('val'+i).className='big mono '+ucls(v);
      const t=$('tag'+i);t.textContent=v>=0?'증가':'감소';t.className='tag '+(v>=0?'u':'d');}
    $('meta'+i).textContent='24h 변화 · '+(mt.basis||'Binance 선물');
    try{const oi=await J(`https://fapi.binance.com/futures/data/openInterestHist?symbol=${it.sym}&period=${m.p}&limit=${m.lim}`);
      const labels=oi.map(x=>lbl(x.timestamp,tf)),data=oi.map(x=>+x.sumOpenInterestValue);
      lineChart('ch'+i,labels,data,'rgb(255,59,48)',usd);
      $('note'+i).textContent='출처 Binance 선물 OI · 라이브';
    }catch(e){$('ch'+i).closest('.chartbox').innerHTML='<div class="empty">OI 데이터를 불러오지 못했습니다.</div>';}
  }
}

renderCards();
if(cfg.live==='oi'){
  $('tf').style.display='flex';
  fillOi('1D');
  document.querySelectorAll('#tf button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#tf button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderCards();fillOi(b.dataset.tf);});
  setInterval(()=>{const on=document.querySelector('#tf button.on');fillOi(on?on.dataset.tf:'1D');},60000);
}else{
  fillEtfCb();
  setInterval(fillEtfCb,60000);
  document.querySelectorAll('#etfTf button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#etfTf button').forEach(x=>x.classList.remove('on'));b.classList.add('on');ETFMODE=b.dataset.agg;drawEtfCharts();});
}
</script>
</body></html>
