<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 불개미 CRYPTO - 이벤트 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d1a;--card:#1a1a2e;--card-hover:#222240;--primary:#ff4444;--accent:#ff8c00;--text:#e0e0e0;--muted:#888;--green:#00c853;--urgent:#ff1744;--border:#2a2a4a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1a0a0a,#2a1020,#1a1a2e);padding:2rem 1rem;text-align:center;border-bottom:2px solid var(--primary);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(255,68,68,.08),transparent 50%);animation:glow 8s ease-in-out infinite alternate}
@keyframes glow{to{background:radial-gradient(circle at 70% 50%,rgba(255,140,0,.08),transparent 50%)}}
.header h1{font-size:1.8rem;color:var(--primary);position:relative;z-index:1}
.header h1 span{color:var(--accent)}
.header p{color:var(--muted);margin-top:.5rem;font-size:.9rem;position:relative;z-index:1}
.stats{display:flex;justify-content:center;gap:2rem;margin-top:1rem;position:relative;z-index:1}
.stat{text-align:center}.stat-num{font-size:1.5rem;font-weight:700;color:var(--accent)}.stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.filters{display:flex;gap:.5rem;padding:1rem;overflow-x:auto;justify-content:center;flex-wrap:wrap}
.filter-btn{padding:.5rem 1rem;border-radius:2rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.8rem;transition:all .3s;white-space:nowrap}
.filter-btn:hover,.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.container{max-width:800px;margin:0 auto;padding:0 1rem 2rem}
.event-card{background:var(--card);border-radius:12px;padding:1.2rem;margin-bottom:1rem;border:1px solid var(--border);transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.event-card:hover{transform:translateY(-2px);border-color:var(--accent);background:var(--card-hover)}
.event-card.urgent{animation:pulse-border 2s infinite}
@keyframes pulse-border{0%,100%{border-color:var(--urgent)}50%{border-color:transparent}}
.event-card.ended{opacity:.4;filter:grayscale(.5)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.8rem}
.card-title{font-size:1rem;font-weight:600;color:#fff;flex:1}
.badge{padding:.2rem .6rem;border-radius:1rem;font-size:.65rem;font-weight:600;white-space:nowrap}
.badge-에어드랍{background:rgba(0,200,83,.15);color:#00c853}
.badge-파밍{background:rgba(255,140,0,.15);color:#ff8c00}
.badge-AMA{background:rgba(33,150,243,.15);color:#2196f3}
.badge-커뮤니티{background:rgba(156,39,176,.15);color:#ce93d8}
.badge-투자의견{background:rgba(255,68,68,.15);color:#ff4444}
.card-desc{color:var(--muted);font-size:.85rem;margin-bottom:.8rem;line-height:1.4}
.card-meta{display:flex;flex-wrap:wrap;gap:.8rem;align-items:center;font-size:.8rem}
.meta-item{display:flex;align-items:center;gap:.3rem}
.meta-item.reward{color:var(--accent)}
.meta-item.date{color:var(--muted)}
.countdown{display:inline-block;padding:.15rem .5rem;border-radius:.3rem;font-weight:700;font-size:.75rem}
.countdown.live{background:rgba(0,200,83,.15);color:#00c853}
.countdown.soon{background:rgba(255,23,68,.15);color:#ff1744}
.countdown.ended{background:rgba(136,136,136,.15);color:#888}
.participate-btn{display:inline-block;margin-top:.8rem;padding:.5rem 1.2rem;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;text-decoration:none;border-radius:2rem;font-size:.8rem;font-weight:600;transition:all .3s}
.participate-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(255,68,68,.3)}
.event-card.ended .participate-btn{background:var(--border);pointer-events:none}
.footer{text-align:center;padding:2rem 1rem;border-top:1px solid var(--border);color:var(--muted);font-size:.8rem}
.footer a{color:var(--accent);text-decoration:none}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.soon{background:var(--urgent);animation:blink 1s infinite}
.status-dot.ended{background:var(--muted)}
@keyframes blink{50%{opacity:.3}}
@media(max-width:600px){.header h1{font-size:1.4rem}.stats{gap:1rem}.card-meta{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="header">
<h1>🔥 불개미 <span>CRYPTO</span></h1>
<p>커뮤니티 이벤트 대시보드</p>
<div class="stats">
<div class="stat"><div class="stat-num" id="activeCount">-</div><div class="stat-label">진행중</div></div>
<div class="stat"><div class="stat-num" id="urgentCount">-</div><div class="stat-label">마감임박</div></div>
<div class="stat"><div class="stat-num" id="totalCount">-</div><div class="stat-label">전체</div></div>
</div>
</div>
<div class="filters" id="filters"></div>
<div class="container" id="events"></div>
<div class="footer">
<p>🔥 <a href="https://t.me/fireantcrypto" target="_blank">불개미 CRYPTO 채널</a> · <a href="https://x.com/ROKMCFIREANT" target="_blank">X (트위터)</a></p>
<p style="margin-top:.5rem">Powered by 딸수 🫡 | 마지막 업데이트: <span id="lastUpdate"></span></p>
</div>
<script>
const CATEGORIES=['전체','에어드랍','파밍','AMA','커뮤니티','투자의견'];
let events=[],currentFilter='전체';

async function init(){
try{const r=await fetch('events.json');events=await r.json()}catch(e){events=[]}
renderFilters();render();setInterval(render,60000);
document.getElementById('lastUpdate').textContent=new Date().toLocaleString('ko-KR');
}

function getStatus(deadline){
const now=new Date(),end=new Date(deadline),diff=end-now,days=diff/(1000*60*60*24);
if(diff<=0)return{label:'종료',class:'ended',days:0};
if(days<=3)return{label:`D-${Math.ceil(days)}`,class:'soon',days};
return{label:`D-${Math.ceil(days)}`,class:'live',days};
}

function renderFilters(){
const el=document.getElementById('filters');
el.innerHTML=CATEGORIES.map(c=>`<button class="filter-btn${c===currentFilter?' active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
}

function setFilter(f){currentFilter=f;renderFilters();render()}

function render(){
const el=document.getElementById('events');
let filtered=currentFilter==='전체'?events:events.filter(e=>e.category===currentFilter);
filtered=filtered.map(e=>({...e,status:getStatus(e.deadline)}))
.sort((a,b)=>{
if(a.status.class==='ended'&&b.status.class!=='ended')return 1;
if(a.status.class!=='ended'&&b.status.class==='ended')return -1;
return a.status.days-b.status.days;
});
const active=events.filter(e=>getStatus(e.deadline).class!=='ended').length;
const urgent=events.filter(e=>getStatus(e.deadline).class==='soon').length;
document.getElementById('activeCount').textContent=active;
document.getElementById('urgentCount').textContent=urgent;
document.getElementById('totalCount').textContent=events.length;
if(!filtered.length){el.innerHTML='<div class="empty">📭 해당 카테고리에 이벤트가 없습니다.</div>';return}
el.innerHTML=filtered.map(e=>{
const s=e.status;
return`<div class="event-card ${s.class==='soon'?'urgent':''} ${s.class==='ended'?'ended':''}">
<div class="card-top">
<div class="card-title">📌 ${e.title}</div>
<span class="badge badge-${e.category}">${e.category}</span>
</div>
<div class="card-desc">${e.description}</div>
<div class="card-meta">
<div class="meta-item date">🗓 <span class="status-dot ${s.class}"></span><span class="countdown ${s.class}">${s.class==='ended'?'종료':s.label}</span></div>
<div class="meta-item reward">💎 ${e.rewards}</div>
</div>
<a href="${e.link}" target="_blank" class="participate-btn">${s.class==='ended'?'종료됨':'참여하기 →'}</a>
</div>`}).join('');
}
init();
</script>
</body>
</html>
