<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>개미 터미널 — PC 테스트(토스 컨셉)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',sans-serif;-webkit-tap-highlight-color:transparent;}
/* 한국식: 상승=빨강, 하락=파랑 */
:root{--bg:#0e1116;--card:#171b22;--card2:#1f2530;--txt:#fff;--gray:#8b95a1;--line:rgba(255,255,255,.08);--blue:#3182f6;
  --redText:#ff5d6c;--blueText:#4d9bff;
  --posBg:linear-gradient(150deg,#6b1f2e,#3a1620);--posBd:#7a2a3a;
  --negBg:linear-gradient(150deg,#1f3a6b,#16203a);--negBd:#2a4a7a;}
body{background:var(--bg);color:var(--txt);font-weight:600;}
.mono{font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
.nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:20px;padding:16px 32px;background:rgba(14,17,22,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.nav .logo{font-size:22px;font-weight:900;}.nav .logo span{color:var(--blue);}
.nav .tabs{display:flex;gap:6px;margin-left:14px;}
.nav .tabs a{padding:9px 16px;border-radius:10px;font-size:15px;font-weight:800;color:var(--gray);text-decoration:none;}
.nav .tabs a.on{background:var(--blue);color:#fff;}.nav .tabs a:hover{color:#fff;}
.nav .t{margin-left:auto;font-size:13px;color:var(--gray);font-weight:700;}
.nav .btn{padding:9px 16px;border-radius:10px;background:var(--blue);color:#fff;font-weight:800;font-size:14px;text-decoration:none;}
.wrap{max-width:1280px;margin:0 auto;padding:26px 32px 60px;}
.sec{font-size:24px;font-weight:900;margin:30px 4px 16px;}
.tile{background:var(--card);border:1px solid transparent;border-radius:22px;}
.tile.pos{background:var(--posBg);border-color:var(--posBd);}
.tile.neg{background:var(--negBg);border-color:var(--negBd);}

.hero{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.hero .cell{padding:30px 32px;}
.hero .lab{font-size:20px;font-weight:800;color:rgba(255,255,255,.82);}
.hero .px{font-size:52px;font-weight:900;margin-top:10px;line-height:1;}
.hero .chg{font-size:24px;font-weight:900;margin-top:12px;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.stats .s{padding:26px 24px;}
.stats .s .l{font-size:17px;font-weight:800;color:rgba(255,255,255,.82);}
.stats .s.plain .l{color:var(--gray);}
.stats .s .v{font-size:34px;font-weight:900;margin-top:10px;}

.sig{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.sig .c{padding:26px 24px;min-height:150px;display:flex;flex-direction:column;justify-content:center;}
.sig .c .t{font-size:17px;font-weight:800;color:rgba(255,255,255,.82);}
.sig .c.plain .t{color:var(--gray);}
.sig .c .big{font-size:36px;font-weight:900;margin-top:12px;line-height:1;}
.sig .c .sub{font-size:13px;color:rgba(255,255,255,.55);font-weight:600;margin-top:10px;}

.duo{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.duo .col{background:var(--card);border-radius:22px;padding:8px 22px 12px;}
.duo .colh{font-size:20px;font-weight:900;padding:16px 0 8px;}
.duo .colh.up{color:var(--redText);}.duo .colh.down{color:var(--blueText);}
.m2{display:flex;align-items:center;gap:13px;padding:14px 2px;border-top:1px solid var(--line);}
.m2 .rk{font-size:15px;font-weight:800;color:var(--gray);width:22px;}
.m2 .lg{width:34px;height:34px;border-radius:50%;flex-shrink:0;}
.m2 .nm{font-size:17px;font-weight:800;}.m2 .sy{font-size:13px;color:var(--gray);font-weight:700;text-transform:uppercase;}
.m2 .pr{margin-left:auto;text-align:right;}
.m2 .pr .p1{font-size:16px;font-weight:800;}
.m2 .pr .p2{font-size:17px;font-weight:900;margin-top:2px;}
.m2 .pr .p2.up{color:var(--redText);}.m2 .pr .p2.down{color:var(--blueText);}
.skel{background:rgba(127,127,127,.18);color:transparent;border-radius:7px;}
.foot{text-align:center;color:var(--gray);font-size:13px;padding:30px;line-height:1.7;}
.tnote{background:#1a2740;border:1px solid #2a4a7a;border-radius:14px;padding:14px 20px;font-size:14px;color:#aac0e0;font-weight:700;margin-bottom:8px;}
</style></head><body>
  <div class="nav">
    <div class="logo">🔥 개미<span> 터미널</span></div>
    <div class="tabs">
      <a class="on" href="#">홈</a>
      <a href="macro-news.html">뉴스</a>
      <a href="market.html">마켓</a>
      <a href="signals.html">시그널</a>
      <a href="indices.html">지수</a>
      <a href="events.html">이벤트</a>
    </div>
    <div class="t" id="ageT">로딩…</div>
    <a class="btn" href="https://t.me/fireant_crypto" target="_blank" rel="noopener">텔레그램</a>
  </div>
  <div class="wrap">
    <div class="tnote">🧪 PC 테스트 — 모바일(토스 컨셉)을 데스크톱 와이드로. 실제 PC 대시보드는 그대로 유지됩니다.</div>
    <div class="hero">
      <div class="cell tile" id="btcCell"><div class="lab">BTC 비트코인</div><div class="px mono skel" id="btcPx">·······</div><div class="chg" id="btcChg">—</div></div>
      <div class="cell tile" id="ethCell"><div class="lab">ETH 이더리움</div><div class="px mono skel" id="ethPx">·······</div><div class="chg" id="ethChg">—</div></div>
    </div>
    <div class="sec">시장 지표</div>
    <div class="stats" id="stats"></div>
    <div class="sec">시그니처 수급</div>
    <div class="sig" id="sig"></div>
    <div class="sec">급등 · 급락</div>
    <div class="duo">
      <div class="col"><div class="colh up">📈 급등 TOP</div><div id="gainers"></div></div>
      <div class="col"><div class="colh down">📉 급락 TOP</div><div id="losers"></div></div>
    </div>
    <div class="foot">🔥 개미 터미널 PC 테스트 · 상승=빨강·하락=파랑 · 데이터 동일(market_now/signature) · 투자 권유 아님</div>
  </div>
<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const comma=(n,d=0)=>n==null?"—":Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const usd=(v)=>{if(v==null)return"—";const a=Math.abs(v),s=v<0?"-":"";if(a>=1e12)return`${s}$${(a/1e12).toFixed(2)}T`;if(a>=1e9)return`${s}$${(a/1e9).toFixed(1)}B`;if(a>=1e6)return`${s}$${(a/1e6).toFixed(1)}M`;return`${s}$${comma(a)}`;};
const pc=(v)=>v==null?"—":`${v>=0?"▲":"▼"} ${Math.abs(v).toFixed(2)}%`;
const dir=(v)=>v==null?"plain":(v>=0?"pos":"neg");
const ud=(v)=>v==null?"":(v>=0?"up":"down");
const safe=(u)=>{try{const x=new URL(u,location.href);return /^https?:$/.test(x.protocol)?x.href:"";}catch{return"";}};
let MN=null;
async function getJSON(u){const r=await fetch(u+(u.includes("?")?"&":"?")+"t="+Date.now(),{cache:"no-store"});if(!r.ok)throw 0;return r.json();}
function setCell(id,cls){const e=$(id);if(e){e.classList.remove("pos","neg","plain");e.classList.add(cls);}}
async function loadHome(){
  try{
    const d=await getJSON("data/v1/market_now.json");MN=d;
    let bn={};try{const a=await getJSON('https://api.binance.com/api/v3/ticker/24hr?symbols=%5B%22BTCUSDT%22%2C%22ETHUSDT%22%5D');if(Array.isArray(a))a.forEach(x=>bn[x.symbol]=x);}catch{}
    const bp=bn.BTCUSDT?+bn.BTCUSDT.lastPrice:(d.btc&&d.btc.price),bc=bn.BTCUSDT?+bn.BTCUSDT.priceChangePercent:(d.btc&&d.btc.chg);
    const ep=bn.ETHUSDT?+bn.ETHUSDT.lastPrice:(d.eth&&d.eth.price),ec=bn.ETHUSDT?+bn.ETHUSDT.priceChangePercent:(d.eth&&d.eth.chg);
    $("btcPx").classList.remove("skel");$("btcPx").textContent="$"+comma(bp);$("btcChg").textContent=pc(bc);$("btcChg").className="chg "+ud(bc);setCell("btcCell",dir(bc));
    $("ethPx").classList.remove("skel");$("ethPx").textContent="$"+comma(ep);$("ethChg").textContent=pc(ec);$("ethChg").className="chg "+ud(ec);setCell("ethCell",dir(ec));
    const fg=d.fear_greed||{};const fgko={"Extreme Fear":"극단공포","Fear":"공포","Neutral":"중립","Greed":"탐욕","Extreme Greed":"극단탐욕"};
    const fgcls=fg.value==null?"plain":(fg.value>=55?"pos":(fg.value<45?"neg":"plain"));
    const cells=[
      ["공포·탐욕",fg.value!=null?`${fg.value} ${fgko[fg.class]||""}`:"—",fgcls],
      ["김치 프리미엄",d.kimchi!=null?(d.kimchi>=0?"+":"")+d.kimchi.toFixed(2)+"%":"—",d.kimchi==null?"plain":dir(d.kimchi)],
      ["BTC 도미넌스",d.btc_dominance!=null?d.btc_dominance.toFixed(1)+"%":"—","plain"],
      ["총 시가총액",usd(d.total_mcap),"plain"],
    ];
    $("stats").innerHTML=cells.map(([l,v,c])=>`<div class="s tile ${c}"><div class="l">${l}</div><div class="v mono">${v}</div></div>`).join("");
    $("ageT").textContent="갱신 "+(d.generated_at||"").slice(11,16);
    renderMovers();
  }catch(e){if($("btcChg"))$("btcChg").textContent="재시도…";}
}
function row(c,i){return `<div class="m2"><span class="rk">${i+1}</span><img class="lg" src="${safe(c.image)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'"><div><div class="nm">${esc(c.name)}</div><div class="sy">${esc((c.symbol||"").toUpperCase())}</div></div><div class="pr"><div class="p1 mono">$${comma(c.price,c.price<1?4:2)}</div><div class="p2 mono ${ud(c.chg)}">${c.chg>=0?"+":""}${c.chg.toFixed(2)}%</div></div></div>`;}
function renderMovers(){if(!MN)return;$("gainers").innerHTML=(MN.gainers||[]).map(row).join("");$("losers").innerHTML=(MN.losers||[]).map(row).join("");}
async function loadSig(){
  try{
    const s=await getJSON("data/v1/signature.json"),M=s.metrics||{};
    const defs=[["btc_etf","💵 BTC 현물 ETF 순유입",1],["eth_etf","💵 ETH 현물 ETF 순유입",1],["btc_oi_24h","📊 BTC 미결제약정",0],["cb_premium","🇺🇸 코인베이스 프리미엄",0]];
    $("sig").innerHTML=defs.map(([k,t,money])=>{const m=M[k]||{},val=m.value;const disp=money?usd(val):(m.raw??(val!=null?val+"%":"—"));const c=dir(val);return `<div class="c tile ${c}"><div class="t">${t}</div><div class="big mono">${disp}</div><div class="sub">${esc((m.basis||"").slice(0,28))}</div></div>`;}).join("");
  }catch(e){$("sig").innerHTML='';}
}
$("sig").innerHTML=Array(4).fill('<div class="c tile plain"><div class="big skel">····</div></div>').join("");
let t1=null,t2=null;
function start(){stop();loadHome();t1=setInterval(loadHome,60000);loadSig();t2=setInterval(loadSig,600000);}
function stop(){clearInterval(t1);clearInterval(t2);}
document.addEventListener("visibilitychange",()=>document.hidden?stop():start());
start();
</script>
</body></html>
